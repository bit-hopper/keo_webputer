<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Screen - Croquet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: url('../assets/bitmaps/topo-pattern_lt-gray.svg') repeat;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        header {
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            color: #333;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 200px;
            gap: 15px;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .screen-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            overflow: hidden;
        }

        .screen-area {
            background: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            flex: 1;
            min-height: 200px;
            border: 1px solid #ddd;
        }

        .screen-preview {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
        }

        .screen-preview video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .controls-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
        }

        .controls-bar button {
            margin: 0;
        }

        #status {
            margin-left: auto;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex: 0 1 auto;
        }

        button:hover:not(:disabled) {
            background: #3d8b40;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #stopBtn {
            background: #e74c3c;
        }

        #stopBtn:hover:not(:disabled) {
            background: #c0392b;
        }

        .status {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            border: 1px solid;
            margin-left: auto;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #1a3a1a;
            color: #7dd87d;
            border-color: #3a6a3a;
        }

        .status.error {
            background: #3a1a1a;
            color: #d87d7d;
            border-color: #6a3a3a;
        }

        .status.info {
            background: #1a2a3a;
            color: #7da8d8;
            border-color: #3a5a6a;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
        }

        .panel {
            background: rgba(102, 126, 234, 0.08);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .panel h3 {
            font-size: 11px;
            color: #667eea;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .user-item {
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
            width: fit-content;
        }

        .user-item:last-child {
            margin-bottom: 0;
        }

        .online-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .controls-bar {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Share Screen</h1>
        </header>

        <div class="main-content">
            <div class="screen-container">
                <div class="screen-area">
                    <div class="screen-preview" id="screenPreview">
                        Click "Start Sharing" to begin
                    </div>
                </div>
                
                <div class="controls-bar">
                    <button id="startBtn">Start Sharing</button>
                    <button id="stopBtn" disabled>Stop</button>
                    <div id="status" class="status"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3>Users Connected</h3>
                    <div id="userList">
                        <div class="user-item">
                            <span class="online-indicator"></span>
                            You (Connected)
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../croquet/croquet.min.js"></script>
    
    <!-- Load virtual-dom as module to get all needed classes -->
    <script type="module">
        import * as VirtualDOM from "../croquet/croquet-virtual-dom.js";
        // Make all needed classes available globally on Croquet
        window.ElementView = VirtualDOM.ElementView;
        window.Croquet.Element = VirtualDOM.Element;
        window.Croquet.ElementView = VirtualDOM.ElementView;
        console.log("✓ ElementView and Element loaded from virtual-dom module");
    </script>

    <script>
        // Add ElementView to Croquet if it's not there (virtual-dom.js exports it)
        // Check periodically and attach it to Croquet namespace
        const attachVirtualDOM = () => {
            if (window.ElementView && !window.Croquet?.ElementView) {
                window.Croquet.ElementView = window.ElementView;
                console.log("✓ Attached ElementView from global scope to Croquet");
                return true;
            }
            return false;
        };
        
        let croquetReady = false;
        let croquetFound = false;  // Dedicated flag to stop polling
        let classesAlreadyDefined = false;
        let appStarted = false;
        let pollInterval = null;  // Track interval ID
        
        // Poll for Croquet availability instead of relying on onload
        function checkCroquetReady() {
            if (croquetFound) {
                return;  // Already found, don't check again
            }
            
            // Try to attach ElementView if not yet attached
            attachVirtualDOM();
            
            // Check for Croquet.Model, not just Croquet, to ensure full initialization
            if (window.Croquet && window.Croquet.Model && window.Croquet.ElementView && window.Croquet.Session) {
                console.log("✓ Croquet is fully ready!");
                croquetFound = true;  // Mark as found immediately
                croquetReady = true;
                if (domReady) {
                    console.log("DOM ready, calling defineClasses");
                    defineClasses();
                }
            }
        }
        
        // Start polling immediately
        pollInterval = setInterval(() => {
            checkCroquetReady();
            // Clear interval once Croquet is found
            if (croquetFound) {
                clearInterval(pollInterval);
                console.log("✓ Polling stopped - Croquet is ready");
            }
        }, 50);
        
        let domReady = false;
        let ShareScreenModel;
        let ShareScreenView;
        
        function defineClasses() {
            if (classesAlreadyDefined) {
                console.log("Classes already defined, skipping");
                return;
            }
            
            if (!croquetReady || !window.Croquet || !window.Croquet.Model) {
                console.log("Waiting for Croquet: croquetReady=" + croquetReady + ", Croquet.Model=" + (typeof window.Croquet?.Model));
                setTimeout(defineClasses, 50);
                return;
            }
            
            classesAlreadyDefined = true;
            console.log("Defining classes...");
            
            // ===== MODEL =====
            ShareScreenModel = class extends Croquet.Model {
                init() {
                    this.isSharing = false;
                    this.sharingUser = null;
                    this.activeUsers = [];
                    
                    this.subscribe("sharescreen", "start-sharing", this.startSharing);
                    this.subscribe("sharescreen", "stop-sharing", this.stopSharing);
                    this.subscribe("sharescreen", "user-joined", this.userJoined);
                    this.subscribe("sharescreen", "user-left", this.userLeft);
                }

                startSharing(data) {
                    if (!this.isSharing) {
                        this.isSharing = true;
                        this.sharingUser = data.userId;
                        this.publish("sharescreen", "sharing-started", { userId: data.userId });
                    }
                }

                stopSharing(data) {
                    if (this.sharingUser === data.userId) {
                        this.isSharing = false;
                        this.sharingUser = null;
                        this.publish("sharescreen", "sharing-stopped");
                    }
                }

                userJoined(data) {
                    if (!this.activeUsers.find(u => u.id === data.userId)) {
                        this.activeUsers.push({ id: data.userId, joinedAt: this.now() });
                        this.publish("sharescreen", "user-list-updated", { users: this.activeUsers });
                    }
                }

                userLeft(data) {
                    this.activeUsers = this.activeUsers.filter(u => u.id !== data.userId);
                    if (this.sharingUser === data.userId) {
                        this.isSharing = false;
                        this.sharingUser = null;
                    }
                    this.publish("sharescreen", "user-list-updated", { users: this.activeUsers });
                }
            };
            ShareScreenModel.register("ShareScreenModel");

            // ===== VIEW =====
            ShareScreenView = class extends Croquet.View {
                constructor(model) {
                    super(model);
                    this.stream = null;
                    this.setupEventListeners();
                    this.publishUserJoined();
                    this.initializeUI();
                }

                setupEventListeners() {
                    const startBtn = document.getElementById("startBtn");
                    const stopBtn = document.getElementById("stopBtn");

                    startBtn.addEventListener("click", () => this.startScreenShare());
                    stopBtn.addEventListener("click", () => this.stopScreenShare());
                }

                initializeUI() {
                    document.getElementById("startBtn").disabled = false;
                    document.getElementById("stopBtn").disabled = true;
                }

                publishUserJoined() {
                    this.publish("sharescreen", "user-joined", { userId: this.viewId });
                }

                async startScreenShare() {
                    try {
                        this.stream = await navigator.mediaDevices.getDisplayMedia({
                            video: { cursor: "always" },
                            audio: false
                        });

                        const video = document.createElement("video");
                        video.srcObject = this.stream;
                        video.play();
                        video.style.width = "100%";
                        video.style.height = "100%";

                        const preview = document.getElementById("screenPreview");
                        preview.innerHTML = "";
                        preview.appendChild(video);

                        // Update button states immediately
                        document.getElementById("startBtn").disabled = true;
                        document.getElementById("stopBtn").disabled = false;

                        this.publish("sharescreen", "start-sharing", { userId: this.viewId });
                        this.showStatus("success", "Screen sharing started");

                        this.stream.getTracks()[0].addEventListener("ended", () => {
                            this.stopScreenShare();
                        });
                    } catch (error) {
                        if (error.name === "NotAllowedError") {
                            this.showStatus("info", "Screen sharing cancelled");
                        } else {
                            this.showStatus("error", `Error: ${error.message}`);
                        }
                    }
                }

                stopScreenShare() {
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                        this.stream = null;
                    }
                    
                    // Update button states immediately
                    document.getElementById("startBtn").disabled = false;
                    document.getElementById("stopBtn").disabled = true;
                    
                    const preview = document.getElementById("screenPreview");
                    preview.innerHTML = "Click \"Start Sharing\" to begin";

                    this.publish("sharescreen", "stop-sharing", { userId: this.viewId });
                    this.showStatus("info", "Screen sharing stopped");
                }

                renderUserList(users) {
                    const container = document.getElementById("userList");
                    const html = `
                        <h3>👥 Users (${users.length + 1})</h3>
                        <div class="user-item">
                            <span class="online-indicator"></span>
                            You (Connected)
                        </div>
                        ${users
                            .map(
                                (user) => `
                            <div class="user-item">
                                <span class="online-indicator"></span>
                                User ${user.id.substring(0, 8)}...
                            </div>
                        `
                            )
                            .join("")}
                    `;
                    container.innerHTML = html;
                }

                showStatus(type, message) {
                    const el = document.getElementById("status");
                    el.className = `status show ${type}`;
                    el.innerHTML = message;
                    setTimeout(() => {
                        el.classList.remove("show");
                    }, 5000);
                }

                update(time) {
                    // Update logic can go here
                }
            };

            console.log("Classes defined, calling main");
            // Classes are now ready, call main
            main();
        }

        // ===== SETUP =====
        function main() {
            console.log("ShareScreen: main() called");
            
            // Ensure Croquet is available
            if (!window.Croquet) {
                console.error("Croquet not available, retrying...");
                setTimeout(main, 100);
                return;
            }
            
            // Use unrestricted Multisynq production key - works on all domains
            const UNRESTRICTED_API_KEY = "2MNFOesKyCSL5y5z0JMn6Wc3TWE02QkQAQSd2sojgW";
            let apiKey = UNRESTRICTED_API_KEY;
            
            console.log("Using unrestricted API key for ShareScreen");
            startSession(apiKey);
        }

        function startSession(apiKey) {
            try {
                console.log("startSession called with apiKey:", apiKey ? "provided" : "empty");
                
                if (!Croquet.Session) {
                    console.error("Croquet.Session not available");
                    return;
                }
                
                let sessionConfig = {
                    appId: "com.example.sharescreen",
                    model: ShareScreenModel,
                    view: ShareScreenView,
                };
                
                // Add apiKey if provided
                if (apiKey) {
                    sessionConfig.apiKey = apiKey;
                    // Use a consistent session name and password so all instances join the same session
                    sessionConfig.name = "share-screen-main-session";
                    sessionConfig.password = "share-screen-shared-session";
                }
                
                console.log("Calling Croquet.Session.join with config:", Object.keys(sessionConfig));
                Croquet.Session.join(sessionConfig);
                console.log("Session join initiated");
            } catch (error) {
                console.error("Error starting session:", error);
                // Show error to user
                const root = document.getElementById("root");
                if (root) {
                    root.innerHTML = `<div style="padding: 20px; color: red; font-family: monospace;"><strong>Error:</strong> ${error.message}</div>`;
                }
            }
        }

        // Wait for Croquet to be available and DOM to be ready
        function startApp() {
            if (appStarted) {
                console.log("App already started, ignoring duplicate call");
                return;
            }
            appStarted = true;
            
            console.log("startApp called");
            domReady = true;
            
            // Show loading message
            const root = document.getElementById("root");
            if (root) {
                root.innerHTML = '<div style="padding: 40px; text-align: center; color: #666; font-family: sans-serif;"><p>Loading Share Screen...</p><p style="font-size: 12px; color: #999;">Initializing Croquet...</p></div>';
            }
            
            // If Croquet is already ready, define classes immediately
            if (croquetReady) {
                console.log("Croquet already ready, defining classes");
                defineClasses();
            } else {
                console.log("Croquet not ready yet, will define classes when ready");
                // defineClasses will be called by the polling function when Croquet becomes ready
            }
        }
        
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", startApp);
        } else {
            startApp();
        }
    </script>
</body>
</html>
