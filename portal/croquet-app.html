<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal - 3D World Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background: #000;
        }

        #portal-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #microverse-root {
            width: 100%;
            height: 100%;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            text-align: center;
            z-index: 10;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 4px;
            max-width: 300px;
            z-index: 20;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(102, 126, 234, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.2);
            color: black;
            padding: 15px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 15;
        }

        .controls p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="portal-container">
        <div id="microverse-root"></div>
        <div class="loading" id="loading">Initializing Portal...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div class="controls">
            <p>Portal - 3D World</p>
            <p>Use mouse to look around</p>
            <p>WASD to move</p>
            <p id="world-info" style="color: #27ae60; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- Microverse will be loaded here -->
    <script type="module">
        // Initialize Portal with Microverse
        
        const showError = (message) => {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            console.error('Portal Error:', message);
        };

        const hideLoading = () => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
        };

        const showWorldInfo = (text) => {
            const info = document.getElementById('world-info');
            if (info) info.textContent = text;
        };

        const loadWorld = (url) => {
            console.log('Loading Portal world:', url);
            
            // Create an iframe to load the world
            const iframe = document.createElement('iframe');
            iframe.id = 'world-frame';
            iframe.src = url;
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.display = 'block';
            
            iframe.onload = () => {
                console.log('iframe onload event fired for:', url);
                hideLoading();
                showWorldInfo(`World: ${url.split('/').pop()}`);
            };

            iframe.onerror = () => {
                console.error('iframe onerror event fired');
                showError(`Failed to load world from: ${url}`);
            };
            
            const root = document.getElementById('microverse-root');
            root.appendChild(iframe);

            // Timeout to ensure loading hides even if no onload fires
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading && loading.style.display !== 'none') {
                    hideLoading();
                }
            }, 2500);
        };

        try {
            // Get world URL or ID from query parameter
            const params = new URLSearchParams(window.location.search);
            const worldParam = params.get('q');

            if (!worldParam) {
                // No parameter - load demo world by default
                console.log('No world parameter, loading demo world...');
                loadWorld('./demo-world.html');
                showWorldInfo('Demo World (Default)');
            } else {
                // Check if it's already a full URL
                let worldUrl = worldParam;
                
                if (!worldParam.startsWith('http://') && !worldParam.startsWith('https://')) {
                    // Treat as a world ID/filename - use relative path
                    worldUrl = `./${worldParam}`;
                    console.log('Constructed URL from world ID:', worldUrl);
                } else {
                    console.log('Using provided URL directly:', worldUrl);
                }
                
                loadWorld(worldUrl);
            }
        } catch (err) {
            showError(`Failed to initialize Portal: ${err.message}`);
            hideLoading();
        }
    </script>
</body>
</html>
