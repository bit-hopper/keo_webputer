<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CID Retriever - IPFS Fetch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        #approot {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            font-family: system-ui;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
        }

        .pdf-viewer {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .pdf-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }

        .pdf-canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background: #e8e8e8;
        }

        #pdfCanvas {
            border: 1px solid #ddd;
            max-width: 100%;
            height: auto;
        }

        .pdf-page-info {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="approot">
        <div id="loading">Loading Dweb app...</div>
    </div>

    <script type="module">
        async function loadCIDRetriever() {
            try {
                console.log("🚀 Starting CID Retriever");

                // Get the base path - determine if we're in an iframe or standalone
                let basePath = "./";
                let isInIframe = typeof window !== "undefined" && window.parent !== window;
                if (isInIframe) {
                    basePath = "/";
                }

                console.log("📦 Importing DWeb App library");
                const mod = await import((isInIframe ? "/" : basePath) + "../src/dweb-app.js");
                const { dwebapp } = mod;

                if (!dwebapp || !dwebapp.expanders) {
                    throw new Error("DWeb App library not properly loaded");
                }

                console.log("✓ DWeb App library imported");
                console.log("  Expanders:", dwebapp.expanders.map(e => e.name || e).join(", "));

                // Mount the UI
                console.log("🎨 Mounting CID Retriever UI");
                const root = document.getElementById("approot");
                root.innerHTML = "";
                
                // Create a simple UI using HTML
                const container = document.createElement("div");
                container.style.cssText = `
                    width: 100%;
                    height: 100%;
                    display: flex;
                    flex-direction: column;
                    padding: 20px;
                    background: #f5f5f5;
                    font-family: system-ui, -apple-system, sans-serif;
                    overflow: auto;
                    gap: 20px;
                `;
                
                const title = document.createElement("h1");
                title.textContent = "File Share";
                title.style.cssText = "margin: 0 0 20px 0; color: #333; font-size: 24px; font-weight: 700;";
                container.appendChild(title);
                const cardsWrapper = document.createElement("div");
                cardsWrapper.style.cssText = `
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 20px;
                    margin-bottom: 20px;
                `;
                
                // ===== CARD 1: FETCH FROM IPFS =====
                const fetchCard = document.createElement("div");
                fetchCard.style.cssText = `
                    background: rgba(102, 126, 234, 0.08);
                    border: 1px solid rgba(102, 126, 234, 0.2);
                    border-radius: 8px;
                    padding: 20px;
                    display: flex;
                    flex-direction: column;
                    gap: 15px;
                    transition: all 0.3s ease;
                `;
                fetchCard.addEventListener("mouseenter", () => {
                    fetchCard.style.background = "rgba(102, 126, 234, 0.12)";
                    fetchCard.style.borderColor = "rgba(102, 126, 234, 0.3)";
                });
                fetchCard.addEventListener("mouseleave", () => {
                    fetchCard.style.background = "rgba(102, 126, 234, 0.08)";
                    fetchCard.style.borderColor = "rgba(102, 126, 234, 0.2)";
                });
                
                const fetchTitle = document.createElement("h2");
                fetchTitle.textContent = "Fetch from IPFS";
                fetchTitle.style.cssText = "margin: 0; color: #333; font-size: 18px;";
                fetchCard.appendChild(fetchTitle);
                
                const label = document.createElement("label");
                label.textContent = "Enter CID:";
                label.style.cssText = "display: block; margin: 0; font-weight: bold; color: #666; font-size: 13px;";
                fetchCard.appendChild(label);
                
                const input = document.createElement("input");
                input.type = "text";
                input.placeholder = "QmXxx...";
                input.style.cssText = `
                    width: 100%;
                    padding: 10px;
                    border: 1px solid #ddd;
                    border-radius: 4px;
                    font-size: 14px;
                    box-sizing: border-box;
                `;
                fetchCard.appendChild(input);
                
                const buttonGroup = document.createElement("div");
                buttonGroup.style.cssText = "display: flex; gap: 10px;";
                
                const fetchBtn = document.createElement("button");
                fetchBtn.textContent = "Fetch";
                fetchBtn.style.cssText = `
                    flex: 1;
                    padding: 10px 20px;
                    background: #27ae60;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 14px;
                `;
                fetchBtn.addEventListener("mouseover", () => {
                    fetchBtn.style.background = "#229954";
                });
                fetchBtn.addEventListener("mouseout", () => {
                    fetchBtn.style.background = "#27ae60";
                });
                buttonGroup.appendChild(fetchBtn);
                
                const clearBtn = document.createElement("button");
                clearBtn.textContent = "Clear";
                clearBtn.style.cssText = `
                    padding: 10px 20px;
                    background: #e74c3c;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 14px;
                `;
                clearBtn.addEventListener("mouseover", () => {
                    clearBtn.style.background = "#c0392b";
                });
                clearBtn.addEventListener("mouseout", () => {
                    clearBtn.style.background = "#e74c3c";
                });
                clearBtn.addEventListener("click", () => {
                    input.value = "";
                    output.innerHTML = "";
                });
                buttonGroup.appendChild(clearBtn);
                fetchCard.appendChild(buttonGroup);
                
                cardsWrapper.appendChild(fetchCard);
                
                // ===== CARD 2: UPLOAD & GENERATE CID =====
                const uploadCard = document.createElement("div");
                uploadCard.style.cssText = `
                    background: rgba(102, 126, 234, 0.08);
                    border: 1px solid rgba(102, 126, 234, 0.2);
                    border-radius: 8px;
                    padding: 20px;
                    display: flex;
                    flex-direction: column;
                    gap: 15px;
                    transition: all 0.3s ease;
                `;
                uploadCard.addEventListener("mouseenter", () => {
                    uploadCard.style.background = "rgba(102, 126, 234, 0.12)";
                    uploadCard.style.borderColor = "rgba(102, 126, 234, 0.3)";
                });
                uploadCard.addEventListener("mouseleave", () => {
                    uploadCard.style.background = "rgba(102, 126, 234, 0.08)";
                    uploadCard.style.borderColor = "rgba(102, 126, 234, 0.2)";
                });
                
                const uploadTitle = document.createElement("h2");
                uploadTitle.textContent = "Upload & Generate CID";
                uploadTitle.style.cssText = "margin: 0; color: #333; font-size: 18px;";
                uploadCard.appendChild(uploadTitle);
                
                const uploadLabel = document.createElement("label");
                uploadLabel.textContent = "Select file:";
                uploadLabel.style.cssText = "display: block; margin: 0; font-weight: bold; color: #666; font-size: 13px;";
                uploadCard.appendChild(uploadLabel);
                
                const fileInput = document.createElement("input");
                fileInput.type = "file";
                fileInput.style.cssText = `
                    padding: 10px;
                    border: 1px solid #ddd;
                    border-radius: 4px;
                    font-size: 14px;
                    box-sizing: border-box;
                `;
                uploadCard.appendChild(fileInput);
                
                const uploadBtnGroup = document.createElement("div");
                uploadBtnGroup.style.cssText = "display: flex; gap: 10px;";
                
                const uploadBtn = document.createElement("button");
                uploadBtn.textContent = "Generate CID";
                uploadBtn.style.cssText = `
                    flex: 1;
                    padding: 10px 20px;
                    background: #27ae60;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 14px;
                `;
                uploadBtn.addEventListener("mouseover", () => {
                    uploadBtn.style.background = "#229954";
                });
                uploadBtn.addEventListener("mouseout", () => {
                    uploadBtn.style.background = "#27ae60";
                });
                uploadBtnGroup.appendChild(uploadBtn);
                
                const uploadClearBtn = document.createElement("button");
                uploadClearBtn.textContent = "Clear";
                uploadClearBtn.style.cssText = `
                    padding: 10px 20px;
                    background: #e74c3c;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 14px;
                `;
                uploadClearBtn.addEventListener("mouseover", () => {
                    uploadClearBtn.style.background = "#c0392b";
                });
                uploadClearBtn.addEventListener("mouseout", () => {
                    uploadClearBtn.style.background = "#e74c3c";
                });
                uploadClearBtn.addEventListener("click", () => {
                    fileInput.value = "";
                    uploadOutput.innerHTML = "";
                });
                uploadBtnGroup.appendChild(uploadClearBtn);
                uploadCard.appendChild(uploadBtnGroup);
                
                const uploadOutput = document.createElement("div");
                uploadOutput.style.cssText = `
                    margin-top: 0;
                    padding: 10px;
                    background: #f9f9f9;
                    border-radius: 4px;
                    border: 1px solid #eee;
                    min-height: 60px;
                    overflow: auto;
                    font-size: 12px;
                `;
                uploadOutput.innerHTML = "<p style='color: #999; margin: 0;'>Generated CID will appear here...</p>";
                uploadCard.appendChild(uploadOutput);
                
                cardsWrapper.appendChild(uploadCard);
                container.appendChild(cardsWrapper);
                
                const output = document.createElement("div");
                output.style.cssText = `
                    padding: 15px;
                    background: white;
                    border-radius: 4px;
                    border: 1px solid #ddd;
                    min-height: 100px;
                    overflow: auto;
                    flex: 1;
                `;
                output.innerHTML = "<p style='color: #999;'>Content will appear here...</p>";
                container.appendChild(output);
                
                root.appendChild(container);
                
                // PDF rendering helper
                let pdfDoc = null;
                let currentPage = 1;
                
                async function renderPDF(url) {
                    try {
                        output.innerHTML = "<p style='color: #666;'>Loading PDF...</p>";
                        
                        // Fetch PDF
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                        const response = await fetch(url);
                        const arrayBuffer = await response.arrayBuffer();
                        pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                        
                        // Create PDF viewer interface
                        let pdfHtml = `
                            <div style="width: 100%; height: 100%; display: flex; flex-direction: column;">
                                <div style="display: flex; align-items: center; gap: 10px; padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ddd;">
                                    <button id="prevPage" style="padding: 8px 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer;">← Prev</button>
                                    <span id="pageInfo" style="color: #666; font-size: 14px;"></span>
                                    <button id="nextPage" style="padding: 8px 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer;">Next →</button>
                                </div>
                                <div style="flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; background: #e8e8e8;">
                                    <canvas id="pdfCanvas" style="border: 1px solid #ddd; max-width: 100%;"></canvas>
                                </div>
                            </div>
                        `;
                        output.innerHTML = pdfHtml;
                        
                        currentPage = 1;
                        await renderPage(currentPage);
                        
                        // Add event listeners
                        document.getElementById("prevPage").addEventListener("click", async () => {
                            if (currentPage > 1) {
                                currentPage--;
                                await renderPage(currentPage);
                            }
                        });
                        
                        document.getElementById("nextPage").addEventListener("click", async () => {
                            if (currentPage < pdfDoc.numPages) {
                                currentPage++;
                                await renderPage(currentPage);
                            }
                        });
                    } catch (error) {
                        console.error("PDF rendering error:", error);
                        output.innerHTML = `<p style='color: #d32f2f;'>Error rendering PDF: ${error.message}</p>`;
                    }
                }
                
                async function renderPDFFromBlob(blob) {
                    try {
                        output.innerHTML = "<p style='color: #666;'>Loading PDF...</p>";
                        
                        // Convert blob to arrayBuffer
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                        const arrayBuffer = await blob.arrayBuffer();
                        pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                        
                        // Create PDF viewer interface
                        let pdfHtml = `
                            <div style="width: 100%; height: 100%; display: flex; flex-direction: column;">
                                <div style="display: flex; align-items: center; gap: 10px; padding: 10px; background: #f5f5f5; border-bottom: 1px solid #ddd;">
                                    <button id="prevPage" style="padding: 8px 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer;">← Prev</button>
                                    <span id="pageInfo" style="color: #666; font-size: 14px;"></span>
                                    <button id="nextPage" style="padding: 8px 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer;">Next →</button>
                                </div>
                                <div style="flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; background: #e8e8e8;">
                                    <canvas id="pdfCanvas" style="border: 1px solid #ddd; max-width: 100%;"></canvas>
                                </div>
                            </div>
                        `;
                        output.innerHTML = pdfHtml;
                        
                        currentPage = 1;
                        await renderPage(currentPage);
                        
                        // Add event listeners
                        document.getElementById("prevPage").addEventListener("click", async () => {
                            if (currentPage > 1) {
                                currentPage--;
                                await renderPage(currentPage);
                            }
                        });
                        
                        document.getElementById("nextPage").addEventListener("click", async () => {
                            if (currentPage < pdfDoc.numPages) {
                                currentPage++;
                                await renderPage(currentPage);
                            }
                        });
                    } catch (error) {
                        console.error("PDF rendering error:", error);
                        output.innerHTML = `<p style='color: #d32f2f;'>Error rendering PDF: ${error.message}</p>`;
                    }
                }
                
                async function renderPage(pageNum) {
                    try {
                        const page = await pdfDoc.getPage(pageNum);
                        const scale = 1.5;
                        const viewport = page.getViewport({ scale });
                        
                        const canvas = document.getElementById("pdfCanvas");
                        const context = canvas.getContext("2d");
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        const renderContext = {
                            canvasContext: context,
                            viewport: viewport
                        };
                        
                        await page.render(renderContext).promise;
                        
                        // Update page info
                        document.getElementById("pageInfo").textContent = `Page ${pageNum} of ${pdfDoc.numPages}`;
                        
                        // Update button states
                        document.getElementById("prevPage").disabled = pageNum <= 1;
                        document.getElementById("nextPage").disabled = pageNum >= pdfDoc.numPages;
                    } catch (error) {
                        console.error("Error rendering page:", error);
                    }
                }

                // Add fetch handler
                fetchBtn.addEventListener("click", async () => {
                    const cid = input.value.trim();
                    if (!cid) {
                        output.innerHTML = "<p style='color: #d32f2f;'>Please enter a CID</p>";
                        return;
                    }
                    
                    output.innerHTML = "<p style='color: #666;'>Checking local storage...</p>";
                    
                    try {
                        // First, check if file exists in IndexedDB
                        const storedFile = await retrieveFileFromDB(cid);
                        
                        if (storedFile) {
                            console.log("✓ Found file in local storage:", storedFile.fileName);
                            
                            const blob = new Blob([storedFile.data]);
                            const url = URL.createObjectURL(blob);
                            const contentType = blob.type || 'application/octet-stream';
                            
                            let displayHtml = `<p style='color: #2e7d32; margin: 0 0 10px 0;'>✓ Found in local storage!</p>`;
                            displayHtml += `<p style='color: #999; font-size: 12px; margin: 0 0 10px 0;'>File: ${storedFile.fileName}</p>`;
                            
                            // Show appropriate preview based on file type
                            const fileName = storedFile.fileName.toLowerCase();
                            if (fileName.endsWith('.pdf')) {
                                output.innerHTML = "";
                                await renderPDFFromBlob(blob);
                            } else if (fileName.match(/\.(jpg|jpeg|png|gif|webp)$/)) {
                                displayHtml += `<img src='${url}' style='max-width: 100%; max-height: 400px; border-radius: 4px; border: 1px solid #ddd;' alt='Image'>`;
                                output.innerHTML = displayHtml;
                            } else if (fileName.endsWith('.txt') || fileName.endsWith('.json') || fileName.endsWith('.html')) {
                                const text = new TextDecoder().decode(storedFile.data);
                                const preview = text.slice(0, 500);
                                displayHtml += `<pre style='background: #f5f5f5; padding: 10px; border-radius: 4px; overflow: auto; max-height: 300px; margin: 0; font-size: 12px;'>${preview}</pre>`;
                                if (text.length > 500) {
                                    displayHtml += `<p style='color: #999; margin: 10px 0 0 0; font-size: 12px;'>... (${text.length} bytes total)</p>`;
                                }
                                output.innerHTML = displayHtml;
                            } else {
                                displayHtml += `<p style='color: #666;'>File ready for download</p>`;
                                displayHtml += `<p><a href='${url}' download='${storedFile.fileName}' style='color: #007bff; text-decoration: none;'>Download →</a></p>`;
                                output.innerHTML = displayHtml;
                            }
                            return;
                        }
                        
                        // If not in local storage, try fetching from IPFS gateway
                        output.innerHTML = "<p style='color: #666;'>Fetching from IPFS gateway...</p>";
                        
                        const gateway = "https://dweb.link";
                        const url = `${gateway}/ipfs/${cid}`;
                        
                        console.log("Fetching from:", url);
                        const response = await fetch(url);
                        
                        if (response.ok) {
                            const contentType = response.headers.get("content-type") || "";
                            console.log("Content-Type:", contentType);
                            
                            let displayHtml = `<p style='color: #2e7d32; margin: 0 0 10px 0;'>✓ Content fetched successfully!</p>`;
                            displayHtml += `<p style='color: #999; font-size: 12px; margin: 0 0 10px 0;'>Type: ${contentType}</p>`;
                            
                            // Handle different content types
                            if (contentType.includes("application/pdf")) {
                                // Render PDF
                                output.innerHTML = "";
                                await renderPDF(url);
                            } else if (contentType.includes("image")) {
                                // Display image
                                displayHtml += `<img src='${url}' style='max-width: 100%; max-height: 400px; border-radius: 4px; border: 1px solid #ddd;' alt='IPFS Image'>`;
                                output.innerHTML = displayHtml;
                            } else if (contentType.includes("text/html")) {
                                // Display HTML in iframe
                                displayHtml += `<iframe src='${url}' style='width: 100%; height: 400px; border: 1px solid #ddd; border-radius: 4px;'></iframe>`;
                                output.innerHTML = displayHtml;
                            } else if (contentType.includes("application/json") || contentType.includes("text/plain") || contentType.includes("text/")) {
                                // Display text content
                                const text = await response.text();
                                const preview = text.slice(0, 500);
                                displayHtml += `<pre style='background: #f5f5f5; padding: 10px; border-radius: 4px; overflow: auto; max-height: 300px; margin: 0; font-size: 12px;'>${preview}</pre>`;
                                if (text.length > 500) {
                                    displayHtml += `<p style='color: #999; margin: 10px 0 0 0; font-size: 12px;'>... (${text.length} bytes total)</p>`;
                                }
                                output.innerHTML = displayHtml;
                            } else {
                                // For unknown types, show the URL
                                const blob = await response.blob();
                                displayHtml += `<p style='color: #666;'>Binary content (${blob.type || 'unknown type'}, ${Math.round(blob.size / 1024)} KB)</p>`;
                                displayHtml += `<p><a href='${url}' target='_blank' style='color: #007bff; text-decoration: none;'>Download content →</a></p>`;
                                output.innerHTML = displayHtml;
                            }
                        } else {
                            output.innerHTML = `<p style='color: #d32f2f;'>Error: ${response.status} ${response.statusText}</p>`;
                        }
                    } catch (error) {
                        console.error("Fetch error:", error);
                        output.innerHTML = `<p style='color: #d32f2f;'>Error: ${error.message}</p>`;
                    }
                });

                // Upload handler with Local Storage (IndexedDB)
                async function generateCID(fileBytes) {
                    // Simple SHA256 implementation using Web Crypto API
                    const hashBuffer = await crypto.subtle.digest('SHA-256', fileBytes);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                    
                    // Create a simple CIDv0 using raw SHA256
                    // CIDv0 format: Qm + base58(SHA256_hash)
                    const base58chars = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
                    const hashBytes = new Uint8Array(hashArray.map(x => parseInt(x, 16)));
                    
                    // Encode to base58
                    let num = 0n;
                    for (let byte of hashBytes) {
                        num = num * 256n + BigInt(byte);
                    }
                    
                    let base58 = '';
                    while (num > 0n) {
                        base58 = base58chars[Number(num % 58n)] + base58;
                        num = num / 58n;
                    }
                    
                    // Prepend hash function code (0x12 = SHA2-256) and length (0x20 = 32 bytes)
                    const cidStr = 'Qm' + base58;
                    return cidStr;
                }
                
                async function storeFileInDB(cid, fileData, fileName) {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open('dwebFileStore', 1);
                        
                        request.onerror = () => reject(request.error);
                        
                        request.onupgradeneeded = (event) => {
                            const db = event.target.result;
                            if (!db.objectStoreNames.contains('files')) {
                                db.createObjectStore('files', { keyPath: 'cid' });
                            }
                        };
                        
                        request.onsuccess = () => {
                            const db = request.result;
                            const transaction = db.transaction(['files'], 'readwrite');
                            const store = transaction.objectStore('files');
                            
                            store.put({
                                cid: cid,
                                data: fileData,
                                fileName: fileName,
                                timestamp: Date.now()
                            });
                            
                            transaction.oncomplete = () => resolve();
                            transaction.onerror = () => reject(transaction.error);
                        };
                    });
                }
                
                async function retrieveFileFromDB(cid) {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open('dwebFileStore', 1);
                        
                        request.onerror = () => reject(request.error);
                        
                        request.onupgradeneeded = (event) => {
                            const db = event.target.result;
                            if (!db.objectStoreNames.contains('files')) {
                                db.createObjectStore('files', { keyPath: 'cid' });
                            }
                        };
                        
                        request.onsuccess = () => {
                            try {
                                const db = request.result;
                                const transaction = db.transaction(['files'], 'readonly');
                                const store = transaction.objectStore('files');
                                const getRequest = store.get(cid);
                                
                                getRequest.onsuccess = () => {
                                    resolve(getRequest.result);
                                };
                                getRequest.onerror = () => reject(getRequest.error);
                            } catch (error) {
                                // Object store doesn't exist yet, return null
                                console.warn("IndexedDB not ready:", error);
                                resolve(null);
                            }
                        };
                    });
                }
                
                uploadBtn.addEventListener("click", async () => {
                    const file = fileInput.files[0];
                    if (!file) {
                        uploadOutput.innerHTML = "<p style='color: #e74c3c; margin: 0;'>Please select a file</p>";
                        return;
                    }
                    
                    uploadOutput.innerHTML = "<p style='color: #666; margin: 0;'>Generating CID and storing file...</p>";
                    
                    try {
                        // Read file
                        const arrayBuffer = await file.arrayBuffer();
                        const uint8Array = new Uint8Array(arrayBuffer);
                        
                        // Generate CID
                        const cid = await generateCID(uint8Array);
                        console.log("Generated CID:", cid);
                        
                        // Store in IndexedDB
                        await storeFileInDB(cid, uint8Array, file.name);
                        console.log("✓ File stored in IndexedDB");
                        
                        // Display result
                        let resultHtml = `
                            <div style='display: flex; flex-direction: column; gap: 10px;'>
                                <p style='color: #27ae60; margin: 0; font-weight: bold;'>✓ File Uploaded & Stored!</p>
                                <p style='color: #666; margin: 0; font-size: 12px;'>File: ${file.name}</p>
                                <p style='color: #666; margin: 0; font-size: 12px;'>Size: ${(file.size / 1024).toFixed(2)} KB</p>
                                <p style='color: #999; margin: 0; font-size: 11px;'>Stored in browser's IndexedDB</p>
                                <div style='background: #f5f5f5; padding: 8px; border-radius: 3px; word-break: break-all; font-family: monospace; font-size: 11px; max-height: 80px; overflow: auto;'>${cid}</div>
                                <button id="copyCidBtn" style='padding: 6px 12px; background: #3498db; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; margin-top: 5px;'>Copy CID</button>
                            </div>
                        `;
                        uploadOutput.innerHTML = resultHtml;
                        
                        // Copy button handler
                        document.getElementById("copyCidBtn").addEventListener("click", () => {
                            navigator.clipboard.writeText(cid).then(() => {
                                const btn = document.getElementById("copyCidBtn");
                                const original = btn.textContent;
                                btn.textContent = "Copied!";
                                setTimeout(() => {
                                    btn.textContent = original;
                                }, 2000);
                            });
                        });
                        
                    } catch (error) {
                        console.error("Upload error:", error);
                        uploadOutput.innerHTML = `
                            <div style='display: flex; flex-direction: column; gap: 5px;'>
                                <p style='color: #e74c3c; margin: 0; font-weight: bold;'>Error uploading file</p>
                                <p style='color: #999; font-size: 12px; margin: 0;'>${error.message}</p>
                            </div>
                        `;
                    }
                });

                console.log("✓ CID Retriever loaded successfully!");

            } catch (error) {
                console.error("❌ Error loading Dweb app:", error);
                const errorRoot = document.getElementById("approot");
                errorRoot.innerHTML = `
                    <div style="padding: 20px; color: #721c24; background: #f8d7da; border-radius: 8px; margin: 20px;">
                <h2>Error Loading Dweb app</h2>
                <p>${error.message}</p>
                <p style="font-size: 12px; color: #666; margin-top: 10px;">
                    Check browser console for more details.
                </p>
                    </div>
                `;
            }
        }

        // Start loading when page is ready
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", loadCIDRetriever);
        } else {
            loadCIDRetriever();
        }
    </script>
</body>
</html>
